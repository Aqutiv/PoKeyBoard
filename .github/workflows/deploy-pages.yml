name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies from lockfile
        run: npm ci

      # Project page lives at /<repo>/, so the app must be built for that
      # subpath (Vite base, manifest scope/start_url/id, SW scope all follow).
      - name: Build for the /PoKeyBoard/ subpath
        run: npm run build
        env:
          POKEYBOARD_BASE: /PoKeyBoard/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
